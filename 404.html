<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Countty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --text: #f0f0f5;
  --text-dim: rgba(255,255,255,0.5);
  --accent: #c084fc;
  --accent-bright: #e879f9;
  --gradient: linear-gradient(135deg, #c084fc, #e879f9, #fb7185);
}

html, body { height: 100%; }

body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
}
.bg-gradient::before {
  content: '';
  position: absolute;
  width: 150vmax;
  height: 150vmax;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 30% 40%, rgba(192,132,252,0.12) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(251,113,133,0.08) 0%, transparent 50%),
              radial-gradient(circle at 50% 50%, rgba(232,121,249,0.06) 0%, transparent 60%);
  animation: bgPulse 12s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  100% { transform: translate(-50%, -50%) scale(1.1) rotate(15deg); }
}

.emoji {
  font-size: 4rem;
  animation: emojiFloat 3s ease-in-out infinite;
  margin-bottom: 24px;
}
@keyframes emojiFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.code {
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.message {
  color: var(--text-dim);
  font-size: 1.1rem;
  margin-top: 8px;
  margin-bottom: 32px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  padding: 12px 28px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.2s ease;
}
.back-link:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="emoji">⏳</div>
<div class="code">404</div>
<p class="message">This timer doesn't exist yet.</p>
<a class="back-link" href="/">Create one</a>
</body>
</html>
